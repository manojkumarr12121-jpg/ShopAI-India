# =====================================================
# ShopAI India - Application Configuration
# =====================================================

server.port=${PORT:8080}
spring.application.name=shopai-india

# =====================================================
# MySQL Database
# =====================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =====================================================
# JPA / Hibernate
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =====================================================
# JWT Security
# =====================================================
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=86400000

# =====================================================
# AI Content Generation (Gemini)
# =====================================================
ai.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
ai.api.key=${AI_API_KEY}
ai.model=gemini-2.0-flash
ai.max.tokens=500
ai.temperature=0.7

# =====================================================
# File Upload
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/products

# =====================================================
# CORS
# =====================================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# =====================================================
# Cache
# =====================================================
spring.cache.type=simple
spring.cache.cache-names=products,categories,trending,featured

# =====================================================
# Logging
# =====================================================
logging.level.com.shopai=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n