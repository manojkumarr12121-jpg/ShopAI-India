# =====================================================
# ShopAI India - Application Configuration
# Enhanced E-Commerce Personalization Using AI
# =====================================================

server.port=8080
spring.application.name=shopai-india

# =====================================================
# MySQL Database
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/shopai_india?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1801
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =====================================================
# JPA / Hibernate
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =====================================================
# JWT Security
# =====================================================
jwt.secret=ShopAIIndiaSecretKey2024SuperSecureJWTSigningKeyMinimum256BitsLong!
jwt.expiration.ms=86400000

# =====================================================
# AI Content Generation (OpenAI GPT)
# =====================================================
ai.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
ai.api.key=AIzaSyCAqx79iQBN3kxvQs6lY5W8NdeJTEmuPwQ
ai.model=gemini-2.0-flash
ai.max.tokens=500
ai.temperature=0.7

# =====================================================
# File Upload
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/products

# =====================================================
# CORS
# =====================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500,http://127.0.0.1:5501

# =====================================================
# Cache
# =====================================================
spring.cache.type=simple
spring.cache.cache-names=products,categories,trending,featured

# =====================================================
# Logging
# =====================================================
logging.level.com.shopai=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
